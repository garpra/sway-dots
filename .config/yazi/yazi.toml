# ~/.config/yazi/yazi.toml

[mgr]
show_hidden = true
sort_by = "natural"
sort_sensitive = false
sort_dir_first = true
ratio = [0, 7, 3]
linemode = "size"

[preview]
image_filter = "lanczos3"
image_quality = 75
max_width = 800
max_height = 1000

[opener]

play = [
  { run = 'mpv "$@"', orphan = true },
]

edit = [
  { run = 'nvim "$@"', block = true },
]

view_image = [
  { run = 'imv-dir "$@"', orphan = true },
]

extract = [
  { run = 'bsdtar -xf "$@" -C "$(dirname "$1")"', desc = "Extract archive" },
]

open = [
  { run = 'xdg-open "$@"', orphan = true },
]

[open]
rules = [
  { mime = "image/*", use = "view_image" },
  { mime = "video/*", use = "play" },
  { mime = "audio/*", use = "play" },

  { mime = "application/*zip*", use = "extract" },
  { mime = "application/x-tar", use = "extract" },
  { mime = "application/x-7z-compressed", use = "extract" },
  { mime = "application/x-rar", use = "extract" },
  { mime = "application/*compressed*", use = "extract" },

  { mime = "text/*", use = "edit" },

  { mime = "*", use = "open" },
]
